<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Learning Cloud</title>
    <link rel="icon" href="../image/main.png" type="image/png">
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/common.css">
</head>
<body>

    <div class="topbar">
        <div class="brand">
            <img src="../image/main_bg_transparent.png" alt="Python Learning Cloud" class="brand-logo">
            <span class="brand-name">Python Learning Cloud</span>
        </div>

        <div>
            <button id="loginButton">ログイン</button>
        </div>
    </div>

    <div class="container">
        <div class="card">

            <h2>Python学習アプリへようこそ</h2>

            <p class="description">
                Pythonの基本を問題演習で学び、
                進捗を確認できる学習アプリです。
            </p>

            <div class="button-group">
                <button id="dashboardButton">
                    学習進捗を見る
                </button>

                <button id="startButton">
                    学習を始める
                </button>

                <button id="textbookButton">
                    Python教科書
                </button>

                <button id="settingsButton">
                    アカウント設定
                </button>
            </div>

            <p id="message"></p>

        </div>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/index.js"></script>
</body>
</html>
