<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理画面 | Python Learning Cloud</title>
    <link rel="icon" href="../image/main.png" type="image/png">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <!-- 【topbar：管理者向けナビゲーション】 -->
    <div class="topbar">
        <div class="brand">
            <img src="../image/main_bg_transparent.png" alt="Python Learning Cloud" class="brand-logo">
            <span class="brand-name">問題管理画面</span>
        </div>

        <div>
            <button id="homeButton">ホーム</button>
            <button id="dashboardButton">ダッシュボード</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <p class="description">登録されている問題一覧</p>

            <!-- 【table-wrapper：スマホで横スクロール対応】 -->
            <div class="table-wrapper">
                <table id="questionTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>chapter</th>
                        <th>category</th>
                        <th>difficulty</th>
                        <th>judge_type</th>
                        <th>question</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            </div>

            <p id="message"></p>
        </div>
    </div>

    <script src="../js/common.js"></script>
    <script src="../utils/api.js"></script>
    <script src="../js/admin.js"></script>
</body>
</html>
